<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocKeep — Document Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background:  'var(--background)',
            foreground:  'var(--foreground)',
            card:        { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
            primary:     { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
            secondary:   { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
            muted:       { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
            border:      'var(--border)',
            destructive: 'var(--destructive)',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --background:#F3F6FE; --foreground:#1A1C26;
      --card:#FFFFFF; --card-foreground:#1A1C26;
      --primary:#4285F4; --primary-foreground:#FFFFFF;
      --secondary:#E8F0FE; --secondary-foreground:#1A3A7A;
      --muted:#EEF2FF; --muted-foreground:#5F6368;
      --border:rgba(26,28,38,0.08); --destructive:#EA4335;
    }
    .dark {
      --background:#131318; --foreground:#E3E2F0;
      --card:#1E1E26; --card-foreground:#E3E2F0;
      --primary:#A8C7FA; --primary-foreground:#002B75;
      --secondary:#252535; --secondary-foreground:#CDD5F5;
      --muted:#252535; --muted-foreground:#9EA3B0;
      --border:rgba(255,255,255,0.08); --destructive:#CF6679;
    }
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--background);}
    html,body,#root{height:100%;overflow:hidden;}
    .ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;display:inline-flex;align-items:center;justify-content:center;line-height:1;text-transform:none;white-space:nowrap;direction:ltr;font-feature-settings:'liga';-webkit-font-smoothing:antialiased;user-select:none;}
    .scrollbar-hide{scrollbar-width:none;-ms-overflow-style:none;}
    .scrollbar-hide::-webkit-scrollbar{display:none;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:fadeUp .22s ease-out;}
    .ripple{position:relative;overflow:hidden;}
    .ripple::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;border-radius:inherit;transition:opacity .15s;}
    .ripple:active::after{opacity:.08;}
    .search-focus:focus-within{border-color:var(--primary)!important;}
    .toggle-thumb{transition:transform .25s cubic-bezier(.4,0,.2,1);}
    .toggle-track{transition:background-color .25s;}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    /* ── Config ───────────────────────────────── */
    // 1. Deploy the Apps Script as a Web App (Deploy → New deployment → Web app,
    //    execute as "Me", access "Anyone") and paste the /exec URL below.
    // 2. Create an OAuth Client ID (Web application) in Google Cloud Console,
    //    add your site's URL under "Authorized JavaScript origins", and paste it below.
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycRdvMBwc5LJ4_PNXVTfruVdCY2nfduhvaR4cbAJt3ruv8H5fQePpgYiYL9SE-d7GvUQ/exec";
    const GOOGLE_CLIENT_ID = "836813073207-6i49go55g3939puiog1c0nligande9u9.apps.googleusercontent.com";
    const CONFIGURED = !APPS_SCRIPT_URL.includes("PASTE_") && !GOOGLE_CLIENT_ID.includes("PASTE_");

    /* ── API layer ────────────────────────────── */
    // Apps Script web apps don't send CORS headers for custom content types,
    // so we POST as text/plain to avoid a preflight OPTIONS request (which Apps
    // Script can't answer). The body is still JSON — Apps Script parses it fine.
    async function apiCall(action, payload = {}) {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, ...payload }),
      });
      if (!res.ok) throw new Error(`Server error (${res.status})`);
      const data = await res.json();
      if (data.status === false) throw new Error(data.message || "Request failed");
      return data;
    }
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(",")[1]);
        r.onerror = () => reject(r.error);
        r.readAsDataURL(file);
      });
    }
    function decodeJwt(token) {
      const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
      return JSON.parse(decodeURIComponent(escape(atob(base64))));
    }

    /* ── Icon ─────────────────────────────────── */
    function I({ n, size=20, fill=0, w=300, cls="", style={} }) {
      return (
        <span className={`ms ${cls}`}
          style={{fontSize:`${size}px`,fontVariationSettings:`'FILL' ${fill},'wght' ${w},'GRAD' 0,'opsz' ${Math.max(20,size)}`,...style}}>
          {n}
        </span>
      );
    }

    /* ── Data ─────────────────────────────────── */
    // These are populated live from the Apps Script backend (see refreshDocuments
    // below). They're plain mutable arrays rather than React state on purpose —
    // every screen component reads them at render time, and App re-renders the
    // whole tree (via docsTick) whenever they change, so this stays in sync.
    let DOCS = [];
    let ACTS = [];

    function extToType(name="") {
      const ext = name.split(".").pop().toLowerCase();
      if (["jpg","jpeg","png","gif","webp","heic"].includes(ext)) return "image";
      if (["doc","docx"].includes(ext)) return "word";
      if (["xls","xlsx","csv"].includes(ext)) return "excel";
      if (ext === "pdf") return "pdf";
      return "scan";
    }
    function formatBytes(n) {
      n = Number(n) || 0;
      if (n < 1024) return `${n} B`;
      if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`;
      return `${(n/1024/1024).toFixed(1)} MB`;
    }
    function mapDocFromApi(d) {
      return {
        id: d.id, name: d.name, title: d.title || d.name, type: extToType(d.name),
        size: formatBytes(d.size), rawSize: Number(d.size)||0, date: d.date ? new Date(d.date).toLocaleDateString() : "",
        docDate: d.docDate || "", expiryDate: d.expiryDate || "", refId: d.refId || "",
        customer: d.customer || "", cat: d.type || "",
        tags: (d.tags ? String(d.tags).split(",").map(t=>t.trim()).filter(Boolean) : []),
        starred: false, url: d.url, driveId: d.driveId,
      };
    }
    function isExpiringSoon(expiryDateStr) {
      if (!expiryDateStr) return false;
      const exp = new Date(expiryDateStr);
      if (isNaN(exp)) return false;
      const days = (exp - new Date()) / (1000*60*60*24);
      return days <= 30; // includes already-expired (negative days)
    }
    async function refreshDocuments(email) {
      const data = await apiCall("documents", { email });
      DOCS = (data.documents || []).map(mapDocFromApi).sort((a,b)=> new Date(b.date)-new Date(a.date));
    }

    /* ── Helpers ──────────────────────────────── */
    function docMeta(type) {
      const m={
        pdf:  {label:"PDF",bg:"#FDECEA",color:"#EA4335"},
        image:{label:"IMG",bg:"#E8F0FE",color:"#4285F4"},
        word: {label:"DOC",bg:"#E3F2FD",color:"#1a73e8"},
        excel:{label:"XLS",bg:"#E6F4EA",color:"#34A853"},
        scan: {label:"SCN",bg:"#FEF7E0",color:"#FBBC05"},
      };
      return m[type]||{label:"FILE",bg:"#F1F3F4",color:"#5F6368"};
    }

    /* ── Shared UI ────────────────────────────── */
    function Avatar({ini,color,size="md"}) {
      const s={sm:"width:32px;height:32px;font-size:12px",md:"width:40px;height:40px;font-size:14px",lg:"width:56px;height:56px;font-size:18px"}[size];
      return <div style={{...Object.fromEntries(s.split(';').filter(Boolean).map(p=>{const [k,v]=p.split(':');return[k.trim().replace(/-([a-z])/g,(_,c)=>c.toUpperCase()),v.trim()]})),borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600,color:'white',flexShrink:0,backgroundColor:color}}>{ini}</div>;
    }
    function Chip({label,active,onClick}) {
      return <button onClick={onClick} style={{padding:'6px 16px',borderRadius:99,fontSize:14,fontWeight:500,cursor:'pointer',border:active?'none':'1px solid var(--border)',background:active?'var(--primary)':'transparent',color:active?'var(--primary-foreground)':'var(--muted-foreground)',transition:'all .15s',flexShrink:0}}>{label}</button>;
    }
    function Toggle({on,onChange}) {
      return <button onClick={()=>onChange(!on)} style={{width:48,height:28,borderRadius:99,border:'none',cursor:'pointer',position:'relative',flexShrink:0,background:on?'var(--primary)':'var(--muted)',transition:'background .25s',padding:0}} className="toggle-track">
        <div className="toggle-thumb" style={{width:20,height:20,borderRadius:'50%',background:'white',position:'absolute',top:4,transform:`translateX(${on?22:4}px)`,boxShadow:'0 1px 4px rgba(0,0,0,.25)'}}/>
      </button>;
    }
    function StatCard({icon,label,value,sub,color}) {
      return <div className="bg-card rounded-2xl border border-border flex flex-col gap-3" style={{padding:16}}>
        <div style={{width:40,height:40,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:color+'18',color}}>
          <I n={icon} size={20}/>
        </div>
        <div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--foreground)',lineHeight:1}}>{value}</div>
          <div style={{fontSize:12,color:'var(--muted-foreground)',marginTop:4}}>{label}</div>
          {sub&&<div style={{fontSize:12,fontWeight:600,color,marginTop:6}}>{sub}</div>}
        </div>
      </div>;
    }

    /* ── Dashboard ────────────────────────────── */
    function DashboardScreen({onNav}) {
      return <div className="flex flex-col gap-6 page-enter" style={{paddingBottom:96}}>
        <div className="flex items-center justify-between lg:hidden">
          <div>
            <p style={{fontSize:14,color:'var(--muted-foreground)'}}>Welcome,</p>
            <h1 style={{fontSize:24,fontWeight:800,color:'var(--foreground)',margin:0}}>Welcome</h1>
          </div>
          <button className="ripple" style={{width:40,height:40,borderRadius:'50%',background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}>
            <I n="notifications" size={20} cls="text-foreground"/>
            <span style={{position:'absolute',top:8,right:8,width:8,height:8,background:'var(--primary)',borderRadius:'50%',outline:'2px solid var(--card)'}}/>
          </button>
        </div>

        <button onClick={()=>onNav("search")} className="ripple" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left',transition:'border-color .15s'}}>
          <I n="search" size={18} style={{color:'var(--muted-foreground)',flexShrink:0}}/>
          <span style={{fontSize:14,color:'var(--muted-foreground)',flex:1}}>Search documents, customers…</span>
          <kbd style={{fontSize:11,color:'var(--muted-foreground)',border:'1px solid var(--border)',borderRadius:8,padding:'2px 6px',fontFamily:'inherit'}}>⌘K</kbd>
        </button>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          {[{icon:"upload",label:"Upload",color:"#4285F4"},{icon:"document_scanner",label:"Scan",color:"#34A853"},{icon:"photo_camera",label:"Camera",color:"#FBBC05"},{icon:"layers",label:"Drive",color:"#EA4335"}].map(a=>(
            <button key={a.label} onClick={()=>onNav("scan")} className="ripple" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:'16px 8px',background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',cursor:'pointer',transition:'box-shadow .15s'}}>
              <div style={{width:48,height:48,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',background:a.color+'15',color:a.color}}>
                <I n={a.icon} size={22}/>
              </div>
              <span style={{fontSize:12,fontWeight:500,color:'var(--foreground)'}}>{a.label}</span>
            </button>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
          <StatCard icon="description"  label="Total Documents" value={String(DOCS.length)} sub={DOCS.length===0?"Upload your first document":`${DOCS.length} stored`} color="#4285F4"/>
<StatCard icon="trending_up"  label="This Month"       value={String(DOCS.filter(d=>{const dt=new Date(d.date);const now=new Date();return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();}).length)} sub="uploads this month" color="#9C27B0"/>
          <StatCard icon="warning"      label="Warranties Expiring" value={String(DOCS.filter(d=>d.expiryDate&&isExpiringSoon(d.expiryDate)).length)} sub="within 30 days" color="#EA4335"/>
        </div>

        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <h2 style={{fontSize:15,fontWeight:600,color:'var(--foreground)',margin:0}}>Recent Documents</h2>
            <button onClick={()=>onNav("documents")} style={{fontSize:14,color:'var(--primary)',fontWeight:500,background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:2}}>See all<I n="chevron_right" size={16}/></button>
          </div>
          <div className="scrollbar-hide" style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:8,marginLeft:-16,paddingLeft:16,marginRight:-16,paddingRight:16}}>
            {DOCS.length===0?<div style={{padding:24,textAlign:"center",color:"var(--muted-foreground)"}}>No documents yet.</div>:DOCS.slice(0,5).map(doc=>{
              const {label,bg,color}=docMeta(doc.type);
              return <div key={doc.id} className="ripple" onClick={()=>doc.url&&window.open(doc.url,"_blank","noopener")} style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:12,flexShrink:0,width:160,cursor:'pointer',transition:'box-shadow .15s'}}>
                <div style={{width:'100%',height:96,borderRadius:12,marginBottom:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,background:bg}}>
                  <I n="description" size={28} style={{color}}/>
                  <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,background:color+'20',color}}>{label}</span>
                </div>
                <div style={{fontSize:12,fontWeight:500,color:'var(--foreground)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{doc.title||doc.name}</div>
                <div style={{fontSize:11,color:'var(--muted-foreground)',marginTop:4}}>{doc.date}</div>
                {doc.starred&&<I n="star" size={12} fill={1} style={{color:'#FBBC05',marginTop:4,display:'block'}}/>}
              </div>;
            })}</div>
        </div>

        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <h2 style={{fontSize:15,fontWeight:600,color:'var(--foreground)',margin:0}}>Recent Activity</h2>
            <button onClick={()=>onNav("activity")} style={{fontSize:14,color:'var(--primary)',fontWeight:500,background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:2}}>See all<I n="chevron_right" size={16}/></button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {ACTS.slice(0,4).map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:12,background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:12}}>
                <div style={{width:36,height:36,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:item.color+'18',color:item.color}}>
                  <I n={item.icon} size={17}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--foreground)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.title}</div>
                  <div style={{fontSize:11,color:'var(--muted-foreground)',marginTop:2}}>{item.sub}</div>
                </div>
                <span style={{fontSize:11,color:'var(--muted-foreground)',flexShrink:0,marginLeft:8}}>{item.time}</span>
              </div>
            ))}
          </div>
        </div>
      </div>;
    }

    /* ── Documents ────────────────────────────── */
    function DocumentsScreen({onDelete}) {
      const [view,setView]=useState("grid");
      const [filter,setFilter]=useState("All");
      const [q,setQ]=useState("");
      const FILTERS=["All","PDF","Images","Word","Scanned","Starred"];
      const docs=useMemo(()=>DOCS.filter(d=>{
        const fok=filter==="All"?true:filter==="Starred"?d.starred:filter==="PDF"?d.type==="pdf":filter==="Images"?d.type==="image":filter==="Word"?d.type==="word":filter==="Scanned"?d.type==="scan":true;
        const sok=!q||d.name.toLowerCase().includes(q.toLowerCase())||(d.customer||"").toLowerCase().includes(q.toLowerCase());
        return fok&&sok;
      }),[filter,q]);

      return <div className="flex flex-col gap-4 page-enter" style={{paddingBottom:96}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h1 style={{fontSize:20,fontWeight:800,color:'var(--foreground)',margin:0}}>Documents</h1>
          <div style={{display:'flex',gap:8}}>
            <button className="ripple" style={{width:36,height:36,borderRadius:12,background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
              <I n="tune" size={17} cls="text-foreground"/>
            </button>
            <button onClick={()=>setView(v=>v==="grid"?"list":"grid")} className="ripple" style={{width:36,height:36,borderRadius:12,background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
              <I n={view==="grid"?"view_list":"grid_view"} size={17} cls="text-foreground"/>
            </button>
          </div>
        </div>

        <div className="search-focus" style={{display:'flex',alignItems:'center',gap:12,background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'12px 16px',transition:'border-color .15s'}}>
          <I n="search" size={16} style={{color:'var(--muted-foreground)',flexShrink:0}}/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search documents…" style={{flex:1,fontSize:14,color:'var(--foreground)',background:'transparent',border:'none',outline:'none'}}/>
          {q&&<button onClick={()=>setQ("")} style={{background:'none',border:'none',cursor:'pointer',padding:0}}><I n="close" size={15} cls="text-muted-foreground"/></button>}
        </div>

        <div className="scrollbar-hide" style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
          {FILTERS.map(f=><Chip key={f} label={f} active={filter===f} onClick={()=>setFilter(f)}/>)}
        </div>
        <p style={{fontSize:12,color:'var(--muted-foreground)',margin:0}}>{docs.length} document{docs.length!==1?"s":""}</p>

        {docs.length===0?(
          <div style={{padding:'48px 0',textAlign:'center',color:'var(--muted-foreground)'}}>
            <I n="folder_off" size={40}/>
            <div style={{fontWeight:600,marginTop:12,color:'var(--foreground)'}}>No documents</div>
            <div style={{fontSize:13,marginTop:4}}>Upload something from the Scan tab to see it here.</div>
          </div>
        ):view==="grid"?(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(144px,1fr))',gap:12}}>
            {docs.map(doc=>{
              const {label,bg,color}=docMeta(doc.type);
              return <div key={doc.id} className="ripple" onClick={()=>doc.url&&window.open(doc.url,"_blank","noopener")} style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',overflow:'hidden',cursor:'pointer',transition:'box-shadow .15s'}}>
                <div style={{height:112,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:bg,position:'relative'}}>
                  <I n="description" size={32} style={{color}}/>
                  <span style={{position:'absolute',top:8,left:8,fontSize:11,fontWeight:700,padding:'2px 6px',borderRadius:8,background:color+'25',color}}>{label}</span>
                  <button onClick={e=>{e.stopPropagation();onDelete(doc);}} aria-label={`Delete ${doc.name}`} style={{position:'absolute',top:8,right:8,width:24,height:24,borderRadius:8,border:'none',background:'rgba(0,0,0,.35)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                    <I n="delete" size={13} style={{color:'#fff'}}/>
                  </button>
                </div>
                <div style={{padding:12}}>
                  <div style={{fontSize:12,fontWeight:500,color:'var(--foreground)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{doc.title||doc.name}</div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
                    <span style={{fontSize:11,color:'var(--muted-foreground)'}}>{doc.size}</span>
                    <span style={{fontSize:11,color:'var(--muted-foreground)'}}>{doc.date.split(",")[0]}</span>
                  </div>
                  {doc.customer&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:8}}>
                    <div style={{width:16,height:16,borderRadius:'50%',background:'rgba(66,133,244,.15)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <I n="person" size={10} cls="text-primary"/>
                    </div>
                    <span style={{fontSize:11,color:'var(--muted-foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.customer}</span>
                  </div>}
                </div>
              </div>;
            })}
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {docs.map(doc=>{
              const {label,bg,color}=docMeta(doc.type);
              return <div key={doc.id} className="ripple" onClick={()=>doc.url&&window.open(doc.url,"_blank","noopener")} style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:12,display:'flex',alignItems:'center',gap:12,cursor:'pointer',transition:'box-shadow .15s'}}>

    /* ── Scan ─────────────────────────────────── */
    function ScanScreen({user,onUploaded}) {
      const [drag,setDrag]=useState(false);
      const [picked,setPicked]=useState(null);     // {file,name,size}
      const [title,setTitle]=useState("");
      const [docDate,setDocDate]=useState(()=>new Date().toISOString().slice(0,10));
      const [expiryDate,setExpiryDate]=useState("");
      const [refId,setRefId]=useState("");
      const [uploading,setUploading]=useState(false);
      const [error,setError]=useState("");
      const [done,setDone]=useState(false);
      const inputRef=useRef(null);

      function pickFile(file){
        if(!file) return;
        setError(""); setDone(false);
        setPicked({file,name:file.name,size:file.size});
        setTitle(file.name.replace(/\.[^.]+$/,""));
        setExpiryDate(""); setRefId("");
        setDocDate(new Date().toISOString().slice(0,10));
      }

      async function handleUpload(e){
        e.preventDefault();
        if(!picked) return;
        setUploading(true); setError("");
        try{
          const base64=await fileToBase64(picked.file);
          await apiCall("upload",{
            email:user.email, fileName:picked.name, mimeType:picked.file.type||"application/octet-stream",
            file:base64, type:extToType(picked.name), size:picked.size,
            title: title||picked.name, docDate, expiryDate, refId,
            tags: "",
          });
          await onUploaded();
          setDone(true);
          setPicked(null);
        }catch(err){
          setError(err.message||"Upload failed. Check the Apps Script URL and try again.");
        }finally{
          setUploading(false);
        }
      }

      return <div className="flex flex-col gap-6 page-enter" style={{paddingBottom:96}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:'var(--foreground)',margin:0}}>Upload & Scan</h1>
          <p style={{fontSize:14,color:'var(--muted-foreground)',marginTop:4,marginBottom:0}}>Add documents to your library</p>
        </div>
        <input ref={inputRef} type="file" style={{display:'none'}} onChange={e=>pickFile(e.target.files[0])} aria-hidden="true"/>
        {!picked&&<div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);pickFile(e.dataTransfer.files[0]);}}
          onClick={()=>inputRef.current&&inputRef.current.click()}
          role="button" tabIndex={0} onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();inputRef.current&&inputRef.current.click();}}}
          aria-label="Upload a document from your device"
          style={{border:`2px dashed ${drag?'var(--primary)':done?'#34A853':'var(--border)'}`,borderRadius:24,padding:'48px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:16,cursor:'pointer',transition:'all .2s',background:drag?'rgba(66,133,244,.05)':done?'rgba(52,168,83,.05)':'transparent',transform:drag?'scale(1.01)':'scale(1)'}}>
          <div style={{width:80,height:80,borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',background:done?'rgba(52,168,83,.15)':'rgba(66,133,244,.1)'}}>
            <I n={done?"check_circle":"document_scanner"} size={36} fill={done?1:0} style={{color:done?'#34A853':'var(--primary)'}}/>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontWeight:600,color:'var(--foreground)',fontSize:15}}>{done?"Uploaded! Drop another file":"Drop a file here"}</div>
            <div style={{fontSize:13,color:'var(--muted-foreground)',marginTop:4}}>or click to browse your device</div>
          </div>
          <div style={{display:'flex',gap:8,fontSize:12,color:'var(--muted-foreground)',flexWrap:'wrap',justifyContent:'center'}}>
            {["PDF","JPG","PNG","DOCX"].map(f=><span key={f} style={{background:'var(--muted)',padding:'4px 10px',borderRadius:8}}>{f}</span>)}
            <span>· up to 50 MB</span>
          </div>
        </div>}
        {error&&<div role="alert" style={{padding:12,borderRadius:12,background:'rgba(234,67,53,.1)',color:'var(--destructive)',fontSize:13}}>{error}</div>}

        {picked&&<form onSubmit={handleUpload} className="bg-card rounded-2xl border border-border flex flex-col gap-4" style={{padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(66,133,244,.1)',flexShrink:0}}>
              <I n="description" size={20} cls="text-primary"/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{picked.name}</div>
              <div style={{fontSize:11,color:'var(--muted-foreground)'}}>{formatBytes(picked.size)}</div>
            </div>
            <button type="button" onClick={()=>{setPicked(null);setError("");}} aria-label="Cancel" style={{background:'none',border:'none',cursor:'pointer'}}>
              <I n="close" size={18} cls="text-muted-foreground"/>
            </button>
          </div>

          </div>

          <button type="submit" disabled={uploading} className="ripple" style={{marginTop:4,padding:'12px',borderRadius:14,border:'none',background:'var(--primary)',color:'var(--primary-foreground)',fontWeight:600,fontSize:14,cursor:uploading?'default':'pointer',opacity:uploading?0.7:1}}>
            {uploading?"Uploading…":"Save & Upload"}
          </button>
        </form>}

        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
          {[{icon:"photo_camera",label:"Camera",sub:"Take a photo now",color:"#4285F4",capture:"environment"},{icon:"document_scanner",label:"Scan Document",sub:"Multi-page scan",color:"#34A853",capture:"environment"},{icon:"upload",label:"From Files",sub:"Browse device",color:"#FBBC05"},{icon:"layers",label:"Google Drive",sub:"Import from cloud",color:"#EA4335"}].map(o=>(
            <button key={o.label} className="ripple" onClick={()=>inputRef.current&&inputRef.current.click()} style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:16,display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left',transition:'box-shadow .15s'}}>
              <div style={{width:48,height:48,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:o.color+'15',color:o.color}}>
                <I n={o.icon} size={24}/>
              </div>
              <div style={{minWidth:0}}>
                <div style={{fontWeight:500,color:'var(--foreground)',fontSize:13}}>{o.label}</div>
                <div style={{fontSize:11,color:'var(--muted-foreground)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.sub}</div>
              </div>
            </button>
          ))}
        </div>
        <div>
          <h2 style={{fontSize:15,fontWeight:600,color:'var(--foreground)',marginBottom:12}}>Recent Scans</h2>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {DOCS.filter(d=>d.type==="scan"||d.type==="image").length===0&&<div style={{padding:16,textAlign:'center',color:'var(--muted-foreground)',fontSize:13}}>No scans yet.</div>}
            {DOCS.filter(d=>d.type==="scan"||d.type==="image").map(doc=>{
              const {bg,color}=docMeta(doc.type);
              return <div key={doc.id} style={{display:'flex',alignItems:'center',gap:12,background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:12}}>
                <div style={{width:44,height:44,borderRadius:12,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:bg}}>
                  <I n="description" size={20} style={{color}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.title||doc.name}</div>
                  <div style={{fontSize:11,color:'var(--muted-foreground)'}}>{doc.size} · {doc.date}</div>
                </div>
                <button className="ripple" onClick={()=>doc.url&&window.open(doc.url,"_blank","noopener")} aria-label={`Open ${doc.name}`} style={{width:36,height:36,borderRadius:12,background:'var(--muted)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                  <I n="visibility" size={16} cls="text-muted-foreground"/>
                </button>
              </div>;
            })}
          </div>
        </div>
      </div>;
    }

        </div>
        <nav style={{flex:1,overflowY:'auto',padding:'16px 12px',display:'flex',flexDirection:'column',gap:4}}>
          {SIDE.map(({id,label,icon})=>{
            const active=cur===id;
            return <button key={id} onClick={()=>onNav(id)} className="ripple" style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:16,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',textAlign:'left',color:active?'var(--primary)':'var(--muted-foreground)',background:active?'rgba(66,133,244,.1)':'transparent',transition:'all .15s'}}
              onMouseEnter={e=>{if(!active)e.currentTarget.style.background='var(--muted)';}} onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent';}}>
              <I n={icon} size={18} fill={active?1:0} w={active?500:300}/>
              <span>{label}</span>
              {active&&<div style={{marginLeft:'auto',width:6,height:20,borderRadius:3,background:'var(--primary)',opacity:.6}}/>}
            </button>;
          })}
        </nav>
        <div style={{padding:16,borderTop:'1px solid var(--border)'}}>
          <button onClick={()=>onNav("profile")} style={{display:'flex',alignItems:'center',gap:12,paddingLeft:4,width:'100%',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            {user&&user.picture
              ? <img src={user.picture} alt="" referrerPolicy="no-referrer" style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
              : <div style={{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0,background:'rgba(66,133,244,.15)',color:'var(--primary)'}}>{user?(user.name||user.email||"?").charAt(0).toUpperCase():"?"}</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?(user.name||user.email):"Guest"}</div>
              <div style={{fontSize:11,color:'var(--muted-foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?user.email:"Not signed in"}</div>
            </div>
            <I n="chevron_right" size={15} cls="text-muted-foreground"/>
          </button>
        </div>
      </aside>;
    }

    /* ── Loading ──────────────────────────────── */
    function FullScreenLoader({label}) {
      return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'var(--background)',color:'var(--foreground)'}}>
        <div style={{width:40,height:40,borderRadius:'50%',border:'3px solid var(--muted)',borderTopColor:'var(--primary)',animation:'spin 0.8s linear infinite'}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <div style={{fontSize:13,color:'var(--muted-foreground)'}}>{label}</div>
      </div>;
    }

    /* ── Login ────────────────────────────────── */
    function LoginScreen({onCredential,error}) {
      const btnRef=useRef(null);
      const [gsiError,setGsiError]=useState("");
      useEffect(()=>{
        if(!CONFIGURED){ return; }
        if(!window.google || !window.google.accounts){
          const t=setTimeout(()=>{
            if(!window.google || !window.google.accounts){
              console.error("Google Identity Services script did not load.");
            }
          },3000);
          return ()=>clearTimeout(t);
        }
        try{
          window.google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: (resp)=>onCredential(resp.credential),
          });
          if(btnRef.current){
            window.google.accounts.id.renderButton(btnRef.current, { theme:"outline", size:"large", width:280, shape:"pill" });
          }
        }catch(err){
          console.error("Google Sign-In init failed:", err);
          setGsiError("Google Sign-In couldn't start — this page's URL likely isn't added under \"Authorized JavaScript origins\" for this Client ID (this also fails if you open the file directly instead of via http/https). See the browser console for details.");
        }
      },[]);
      return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--background)',padding:24}}>
        <div className="bg-card rounded-3xl border border-border page-enter" style={{padding:32,maxWidth:360,width:'100%',textAlign:'center'}}>
          <div style={{width:56,height:56,borderRadius:16,margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--primary)'}}>
            <I n="description" size={26} style={{color:'#fff'}}/>
          </div>
          <h1 style={{fontSize:20,fontWeight:800,color:'var(--foreground)',margin:'0 0 4px'}}>DocKeep</h1>
          <p style={{fontSize:13,color:'var(--muted-foreground)',margin:'0 0 24px'}}>Sign in with Google to view and manage your documents.</p>
          {!CONFIGURED
            ? <div style={{fontSize:12,color:'var(--destructive)',background:'rgba(234,67,53,.08)',borderRadius:12,padding:12,textAlign:'left'}}>
                Not configured yet — set <code>APPS_SCRIPT_URL</code> and <code>GOOGLE_CLIENT_ID</code> near the top of the script in this file.
              </div>
            : gsiError
            ? <div style={{fontSize:12,color:'var(--destructive)',background:'rgba(234,67,53,.08)',borderRadius:12,padding:12,textAlign:'left'}}>{gsiError}</div>
            : <div ref={btnRef} style={{display:'flex',justifyContent:'center'}}/>}
          {error&&<div role="alert" style={{marginTop:16,fontSize:12,color:'var(--destructive)'}}>{error}</div>}
        </div>
      </div>;
    }

    /* ── App ──────────────────────────────────── */
    function App() {
      const [dark,setDarkState]=useState(()=>window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      const setDark=(v)=>{const nv=typeof v==="function"?v(dark):v;setDarkState(nv);try{localStorage.setItem("dockeep_dark",nv?"1":"0");}catch(e){}};
      const [screen,setScreen]=useState("dashboard");
      const [user,setUser]=useState(null);
      const [booting,setBooting]=useState(true);   // restoring session on first load
      const [dataLoading,setDataLoading]=useState(false);
      const [authError,setAuthError]=useState("");
      const [, setDocsTick]=useState(0);
      const bump=()=>setDocsTick(t=>t+1);
      const showFAB=screen==="dashboard"||screen==="documents";
      const mainRef=useRef(null);

      useEffect(()=>{
        const upd=()=>{
          const lg=window.matchMedia("(min-width:1024px)").matches;
          if(mainRef.current) mainRef.current.style.marginLeft=lg?"260px":"0";
        };
        upd();
        const mq=window.matchMedia("(min-width:1024px)");
        mq.addEventListener("change",upd);
        return ()=>mq.removeEventListener("change",upd);
      },[]);

      // Restore session + dark-mode preference from localStorage on first load.
      useEffect(()=>{
        try{
          const saved=localStorage.getItem("dockeep_dark");
          if(saved!==null) setDarkState(saved==="1");
        }catch(e){}
        (async()=>{
          try{
            const saved=localStorage.getItem("dockeep_user");
            if(saved){
              const u=JSON.parse(saved);
              setUser(u);
              await loadFor(u);
            }
          }catch(e){}
          setBooting(false);
        })();
      },[]);

      async function loadFor(u){
        setDataLoading(true);
        try{ await refreshDocuments(u.email); bump(); }
        catch(e){ setAuthError(e.message||"Couldn't load your documents."); }
        finally{ setDataLoading(false); }
      }

      async function handleCredential(idToken){
        setAuthError("");
        try{
          const payload=decodeJwt(idToken);
          const u={ email:payload.email, name:payload.name, picture:payload.picture };
          await apiCall("login",{ email:u.email, name:u.name, picture:u.picture });
          localStorage.setItem("dockeep_user",JSON.stringify(u));
          setUser(u);
          await loadFor(u);
        }catch(e){
          setAuthError(e.message||"Sign-in failed. Check the Apps Script URL is deployed and reachable.");
        }
      }

      function handleSignOut(){
        try{
          localStorage.removeItem("dockeep_user");
          if(window.google && window.google.accounts) window.google.accounts.id.disableAutoSelect();
        }catch(e){}
        DOCS=[]; setUser(null); setScreen("dashboard"); bump();
      }

      async function handleDelete(doc){
        if(!window.confirm(`Delete "${doc.name}"? This can't be undone.`)) return;
        const prev=DOCS;
        DOCS=DOCS.filter(d=>d.id!==doc.id); bump();
        try{ await apiCall("delete",{ id:doc.id }); }
        catch(e){ DOCS=prev; bump(); alert("Couldn't delete that document: "+(e.message||"unknown error")); }
      }

      if(booting) return <FullScreenLoader label="Loading DocKeep…"/>;
      if(!user) return <LoginScreen onCredential={handleCredential} error={authError}/>;

      const screens={
        dashboard: <DashboardScreen onNav={setScreen}/>,
        documents: <DocumentsScreen onDelete={handleDelete}/>,
        scan:      <ScanScreen user={user} onUploaded={()=>loadFor(user)}/>,
        activity:  <ActivityScreen/>,
        search:    <SearchScreen onNav={setScreen}/>,
        profile:   <ProfileScreen dark={dark} setDark={setDark} user={user} onSignOut={handleSignOut}/>,
      };

      return <div className={dark?"dark":""} style={{height:'100vh',overflow:'hidden'}}>
        <div style={{height:'100%',display:'flex',overflow:'hidden',background:'var(--background)',color:'var(--foreground)',fontFamily:'Inter,system-ui,sans-serif'}}>
          <Sidebar cur={screen} onNav={setScreen} user={user}/>
          <div ref={mainRef} style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,transition:'margin-left .3s'}}>
            {/* Desktop top bar */}
            <header className="hidden lg:flex" style={{alignItems:'center',justifyContent:'space-between',padding:'16px 32px',borderBottom:'1px solid var(--border)',background:'var(--card)',flexShrink:0,gap:16}}>
              <div><p style={{fontSize:12,color:'var(--muted-foreground)',margin:0}}>Welcome,</p><p style={{fontSize:15,fontWeight:600,color:'var(--foreground)',margin:0}}>{(user.name||user.email).split(" ")[0]} 👋</p></div>
              <button onClick={()=>setScreen("search")} style={{display:'flex',alignItems:'center',gap:12,background:'var(--muted)',borderRadius:16,padding:'10px 16px',width:288,border:'none',cursor:'pointer',textAlign:'left',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--secondary)'} onMouseLeave={e=>e.currentTarget.style.background='var(--muted)'}>
                <I n="search" size={16} style={{color:'var(--muted-foreground)',flexShrink:0}}/>
                <span style={{flex:1,fontSize:14,color:'var(--muted-foreground)'}}>Search documents…</span>
                <kbd style={{fontSize:11,color:'var(--muted-foreground)',border:'1px solid var(--border)',borderRadius:6,padding:'2px 6px',fontFamily:'inherit'}}>⌘K</kbd>
              </button>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {dataLoading&&<div aria-label="Loading" style={{width:16,height:16,borderRadius:'50%',border:'2px solid var(--muted)',borderTopColor:'var(--primary)',animation:'spin 0.8s linear infinite'}}/>}
                <button onClick={()=>setDark(!dark)} className="ripple" style={{width:40,height:40,borderRadius:'50%',background:'var(--muted)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}} aria-label="Toggle dark mode">
                  <I n={dark?"light_mode":"dark_mode"} size={18} cls="text-foreground"/>
                </button>
                <button onClick={()=>setScreen("profile")} className="ripple" style={{width:40,height:40,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,border:'none',cursor:'pointer',background:'rgba(66,133,244,.15)',color:'var(--primary)',overflow:'hidden'}} aria-label="Open profile">
                  {user.picture?<img src={user.picture} alt="" referrerPolicy="no-referrer" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:(user.name||user.email).charAt(0).toUpperCase()}
                </button>
              </div>
            </header>

            {/* Screen */}
            <main style={{flex:1,overflowY:'auto',overflowX:'hidden'}}>
              <div style={{padding:'20px 16px',maxWidth:896,margin:'0 auto'}} key={screen} className="lg:px-8 lg:pt-8">
                {screens[screen]||screens.dashboard}
              </div>
            </main>
          </div>

          {/* FAB */}
          {showFAB&&<button onClick={()=>setScreen("scan")} className="ripple lg:hidden"
            style={{position:'fixed',bottom:88,right:16,zIndex:50,width:56,height:56,borderRadius:16,background:'var(--primary)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 24px rgba(66,133,244,.45)',transition:'transform .15s, box-shadow .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.07)';e.currentTarget.style.boxShadow='0 12px 32px rgba(66,133,244,.55)';}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 8px 24px rgba(66,133,244,.45)';}}>
            <I n="add" size={26} style={{color:'white'}}/>
          </button>}

          <BottomNav cur={screen} onNav={setScreen}/>
        </div>
      </div>;
    }

    /* ── Error boundary ───────────────────────── */
    class ErrorBoundary extends React.Component {
      constructor(props){ super(props); this.state={err:null}; }
      static getDerivedStateFromError(err){ return {err}; }
      componentDidCatch(err,info){ console.error("DocKeep crashed:", err, info); }
      render(){
        if(this.state.err){
          return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,fontFamily:'Inter,system-ui,sans-serif',background:'#F3F6FE'}}>
            <div style={{maxWidth:420,textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
              <h2 style={{color:'#1A1C26',margin:'0 0 8px'}}>Something went wrong</h2>
              <p style={{color:'#5F6368',fontSize:14,margin:'0 0 16px'}}>{String(this.state.err.message||this.state.err)}</p>
              <p style={{color:'#5F6368',fontSize:12}}>Open the browser console (F12) for full details, or reload the page.</p>
            </div>
          </div>;
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(ErrorBoundary, null, React.createElement(App))
    );
  </script>
</body>
</html>
