<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocKeep — Document Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background:  'var(--background)',
            foreground:  'var(--foreground)',
            card:        { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
            primary:     { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
            secondary:   { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
            muted:       { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
            border:      'var(--border)',
            destructive: 'var(--destructive)',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --background:#F3F6FE; --foreground:#1A1C26;
      --card:#FFFFFF; --card-foreground:#1A1C26;
      --primary:#4285F4; --primary-foreground:#FFFFFF;
      --secondary:#E8F0FE; --secondary-foreground:#1A3A7A;
      --muted:#EEF2FF; --muted-foreground:#5F6368;
      --border:rgba(26,28,38,0.08); --destructive:#EA4335;
    }
    .dark {
      --background:#131318; --foreground:#E3E2F0;
      --card:#1E1E26; --card-foreground:#E3E2F0;
      --primary:#A8C7FA; --primary-foreground:#002B75;
      --secondary:#252535; --secondary-foreground:#CDD5F5;
      --muted:#252535; --muted-foreground:#9EA3B0;
      --border:rgba(255,255,255,0.08); --destructive:#CF6679;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html{background:var(--background);}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--background);overflow-x:hidden;}
    html,body,#root{min-height:100%;overflow-x:hidden;overflow-y:auto;}
    /* The dark/light CSS variables are set by a `.dark` class. That class is
       toggled on <html> from JS (see App below) so it cascades down to
       <body> and #root too — otherwise body's background stays stuck on the
       light-mode value even in dark mode, which shows up as a pale strip
       wherever app content is shorter than the browser window. */
    html.dark, body.dark { background: var(--background); }
    .ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;display:inline-flex;align-items:center;justify-content:center;line-height:1;text-transform:none;white-space:nowrap;direction:ltr;font-feature-settings:'liga';-webkit-font-smoothing:antialiased;user-select:none;}
    .scrollbar-hide{scrollbar-width:none;-ms-overflow-style:none;}
    .scrollbar-hide::-webkit-scrollbar{display:none;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:fadeUp .22s ease-out;}
    .ripple{position:relative;overflow:hidden;}
    .ripple::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;border-radius:inherit;transition:opacity .15s;}
    .ripple:active::after{opacity:.08;}
    .search-focus:focus-within{border-color:var(--primary)!important;}
    .toggle-thumb{transition:transform .25s cubic-bezier(.4,0,.2,1);}
    .toggle-track{transition:background-color .25s;}
    .pin-shake{animation:pinShake .4s;}
    @keyframes pinShake{10%,90%{transform:translateX(-4px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    /* ── Config ───────────────────────────────── */
    // 1. Deploy the Apps Script as a Web App (Deploy → New deployment → Web app,
    //    execute as "Me", access "Anyone") and paste the /exec URL below.
    // 2. Create an OAuth Client ID (Web application) in Google Cloud Console,
    //    add your site's URL under "Authorized JavaScript origins", and paste it below.
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycRdvMBwc5LJ4_PNXVTfruVdCY2nfduhvaR4cbAJt3ruv8H5fQePpgYiYL9SE-d7GvUQ/exec";
    const GOOGLE_CLIENT_ID = "836813073207-6i49go55g3939puiog1c0nligande9u9.apps.googleusercontent.com";
    const CONFIGURED = !APPS_SCRIPT_URL.includes("PASTE_") && !GOOGLE_CLIENT_ID.includes("PASTE_");

    /* ── API layer ────────────────────────────── */
    // Apps Script web apps don't send CORS headers for custom content types,
    // so we POST as text/plain to avoid a preflight OPTIONS request (which Apps
    // Script can't answer). The body is still JSON — Apps Script parses it fine.
    async function apiCall(action, payload = {}) {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, ...payload }),
      });
      if (!res.ok) throw new Error(`Server error (${res.status})`);
      const data = await res.json();
      if (data.status === false) throw new Error(data.message || "Request failed");
      return data;
    }
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(",")[1]);
        r.onerror = () => reject(r.error);
        r.readAsDataURL(file);
      });
    }
    function decodeJwt(token) {
      const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
      return JSON.parse(decodeURIComponent(escape(atob(base64))));
    }

    /* ── Icon ─────────────────────────────────── */
    function I({ n, size=20, fill=0, w=300, cls="", style={} }) {
      return (
        <span className={`ms ${cls}`}
          style={{fontSize:`${size}px`,fontVariationSettings:`'FILL' ${fill},'wght' ${w},'GRAD' 0,'opsz' ${Math.max(20,size)}`,...style}}>
          {n}
        </span>
      );
    }

    /* ── Data ─────────────────────────────────── */
    // These are populated live from the Apps Script backend (see refreshDocuments
    // below). They're plain mutable arrays rather than React state on purpose —
    // every screen component reads them at render time, and App re-renders the
    // whole tree (via docsTick) whenever they change, so this stays in sync.
    let DOCS = [];
    let ACTS = [];

    const CATEGORIES = ["Bill","Warranty","ID Card","Insurance","Certificate","Receipt","Other"];

    function extToType(name="") {
      const ext = name.split(".").pop().toLowerCase();
      if (["jpg","jpeg","png","gif","webp","heic"].includes(ext)) return "image";
      if (["doc","docx"].includes(ext)) return "word";
      if (["xls","xlsx","csv"].includes(ext)) return "excel";
      if (ext === "pdf") return "pdf";
      return "scan";
    }
    function formatBytes(n) {
      n = Number(n) || 0;
      if (n < 1024) return `${n} B`;
      if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`;
      return `${(n/1024/1024).toFixed(1)} MB`;
    }
    function mapDocFromApi(d) {
      return {
        id: d.id, name: d.name, title: d.title || d.name, type: extToType(d.name),
        size: formatBytes(d.size), rawSize: Number(d.size)||0, date: d.date ? new Date(d.date).toLocaleDateString() : "",
        docDate: d.docDate || "", expiryDate: d.expiryDate || "", refId: d.refId || "",
        customer: d.customer || "", cat: d.category || d.type || "",
        tags: (d.tags ? String(d.tags).split(",").map(t=>t.trim()).filter(Boolean) : []),
        starred: false, url: d.url, driveId: d.driveId,
      };
    }
    function isExpiringSoon(expiryDateStr) {
      if (!expiryDateStr) return false;
      const exp = new Date(expiryDateStr);
      if (isNaN(exp)) return false;
      const days = (exp - new Date()) / (1000*60*60*24);
      return days <= 30; // includes already-expired (negative days)
    }
    async function refreshDocuments(email) {
      const data = await apiCall("documents", { email });
      DOCS = (data.documents || []).map(mapDocFromApi).sort((a,b)=> new Date(b.date)-new Date(a.date));
    }

    /* ── Activity tracking ────────────────────── */
    // There's no "Activity" sheet on the backend, so real activity (uploads,
    // deletes, opens) is tracked on-device per account and persisted to
    // localStorage — this is what makes the Activity screen reflect what
    // actually happened instead of always showing zeros.
    function activityKey(email) { return "dockeep_acts_"+email; }
    function loadActs(email) {
      try{
        const raw = localStorage.getItem(activityKey(email));
        ACTS = raw ? JSON.parse(raw) : [];
      }catch(e){ ACTS = []; }
    }
    function persistActs(email) {
      try{ localStorage.setItem(activityKey(email), JSON.stringify(ACTS.slice(0,200))); }catch(e){}
    }
    function pushActivity(email, {type,title,sub}) {
      const meta = {
        upload:  {icon:"upload",   color:"#4285F4"},
        delete:  {icon:"delete",   color:"#EA4335"},
        download:{icon:"download", color:"#FBBC05"},
        shared:  {icon:"ios_share",color:"#34A853"},
      }[type] || {icon:"history",color:"#5F6368"};
      ACTS = [{
        id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
        type, icon:meta.icon, color:meta.color, title, sub: sub||"", time: new Date().toISOString(),
      }, ...ACTS].slice(0,200);
      persistActs(email);
    }
    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const s = Math.floor(diff/1000);
      if (s < 60) return "just now";
      const m = Math.floor(s/60); if (m < 60) return `${m}m ago`;
      const h = Math.floor(m/60); if (h < 24) return `${h}h ago`;
      const d = Math.floor(h/24); if (d < 7) return `${d}d ago`;
      return new Date(iso).toLocaleDateString();
    }
    function openDoc(doc, onOpen) {
      if (!doc.url) return;
      window.open(doc.url, "_blank", "noopener");
      onOpen && onOpen(doc);
    }

    /* ── Helpers ──────────────────────────────── */
    function docMeta(type) {
      const m={
        pdf:  {label:"PDF",bg:"#FDECEA",color:"#EA4335"},
        image:{label:"IMG",bg:"#E8F0FE",color:"#4285F4"},
        word: {label:"DOC",bg:"#E3F2FD",color:"#1a73e8"},
        excel:{label:"XLS",bg:"#E6F4EA",color:"#34A853"},
        scan: {label:"SCN",bg:"#FEF7E0",color:"#FBBC05"},
      };
      return m[type]||{label:"FILE",bg:"#F1F3F4",color:"#5F6368"};
    }

    /* ── Shared UI ────────────────────────────── */
    function Avatar({ini,color,size="md"}) {
      const s={sm:"width:32px;height:32px;font-size:12px",md:"width:40px;height:40px;font-size:14px",lg:"width:56px;height:56px;font-size:18px"}[size];
      return <div style={{...Object.fromEntries(s.split(';').filter(Boolean).map(p=>{const [k,v]=p.split(':');return[k.trim().replace(/-([a-z])/g,(_,c)=>c.toUpperCase()),v.trim()]})),borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600,color:'white',flexShrink:0,backgroundColor:color}}>{ini}</div>;
    }
    function Chip({label,active,onClick}) {
      return <button onClick={onClick} style={{padding:'6px 16px',borderRadius:99,fontSize:14,fontWeight:500,cursor:'pointer',border:active?'none':'1px solid var(--border)',background:active?'var(--primary)':'transparent',color:active?'var(--primary-foreground)':'var(--muted-foreground)',transition:'all .15s',flexShrink:0}}>{label}</button>;
    }
    function Toggle({on,onChange}) {
      return <button onClick={()=>onChange(!on)} style={{width:48,height:28,borderRadius:99,border:'none',cursor:'pointer',position:'relative',flexShrink:0,background:on?'var(--primary)':'var(--muted)',transition:'background .25s',padding:0}} className="toggle-track">
        <div className="toggle-thumb" style={{width:20,height:20,borderRadius:'50%',background:'white',position:'absolute',top:4,transform:`translateX(${on?22:4}px)`,boxShadow:'0 1px 4px rgba(0,0,0,.25)'}}/>
      </button>;
    }
    function StatCard({icon,label,value,sub,color}) {
      return <div className="bg-card rounded-2xl border border-border flex flex-col gap-3" style={{padding:16}}>
        <div style={{width:40,height:40,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:color+'18',color}}>
          <I n={icon} size={20}/>
        </div>
        <div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--foreground)',lineHeight:1}}>{value}</div>
          <div style={{fontSize:12,color:'var(--muted-foreground)',marginTop:4}}>{label}</div>
          {sub&&<div style={{fontSize:12,fontWeight:600,color,marginTop:6}}>{sub}</div>}
        </div>
      </div>;
    }

    /* ── PIN lock ─────────────────────────────── */
    function PinKeypad({value,onChange,maxLen=4}) {
      const keys=["1","2","3","4","5","6","7","8","9","","0","back"];
      return <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {keys.map((k,i)=>{
          if(k==="") return <div key={i}/>;
          if(k==="back") return <button key={i} type="button" onClick={()=>onChange(value.slice(0,-1))} className="ripple" style={{height:56,borderRadius:16,border:'none',background:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}} aria-label="Backspace">
            <I n="backspace" size={20} cls="text-foreground"/>
          </button>;
          return <button key={i} type="button" onClick={()=>{ if(value.length<maxLen) onChange(value+k); }} className="ripple" style={{height:56,borderRadius:16,border:'none',background:'var(--muted)',fontSize:20,fontWeight:600,color:'var(--foreground)',cursor:'pointer'}}>{k}</button>;
        })}
      </div>;
    }
    function PinDots({length,total=4}) {
      return <div style={{display:'flex',justifyContent:'center',gap:14}}>
        {Array.from({length:total}).map((_,i)=><div key={i} style={{width:16,height:16,borderRadius:'50%',background:i<length?'var(--primary)':'var(--muted)',transition:'background .15s'}}/>)}
      </div>;
    }
    function PinLockScreen({onUnlock,onForgot}) {
      const [val,setVal]=useState("");
      const [shake,setShake]=useState(false);
      useEffect(()=>{
        if(val.length!==4) return;
        const ok=onUnlock(val);
        if(!ok){
          setShake(true);
          const t=setTimeout(()=>{ setVal(""); setShake(false); },420);
          return ()=>clearTimeout(t);
        }
      },[val]);
      return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,background:'var(--background)',color:'var(--foreground)',padding:24}}>
        <div style={{width:56,height:56,borderRadius:16,marginBottom:8,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--primary)'}}>
          <I n="lock" size={26} style={{color:'#fff'}}/>
        </div>
        <h2 style={{margin:'0 0 4px',fontSize:18}}>Enter your PIN</h2>
        <p style={{margin:'0 0 20px',fontSize:13,color:'var(--muted-foreground)'}}>DocKeep is locked</p>
        <div className={shake?"pin-shake":""} style={{marginBottom:28}}><PinDots length={val.length}/></div>
        <div style={{width:'100%',maxWidth:280}}><PinKeypad value={val} onChange={setVal}/></div>
        <button onClick={onForgot} className="ripple" style={{marginTop:24,background:'none',border:'none',color:'var(--muted-foreground)',fontSize:13,cursor:'pointer',textDecoration:'underline',padding:8}}>Forgot PIN? Sign out</button>
      </div>;
    }
    function PinSetupModal({step,error,onSubmit,onCancel}) {
      const [val,setVal]=useState("");
      useEffect(()=>{ setVal(""); },[step]);
      useEffect(()=>{
        if(val.length!==4) return;
        const v=val;
        const t=setTimeout(()=>onSubmit(v),150);
        return ()=>clearTimeout(t);
      },[val]);
      return <div onClick={onCancel} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div onClick={e=>e.stopPropagation()} className="page-enter" style={{background:'var(--card)',borderRadius:20,padding:24,width:'100%',maxWidth:320,textAlign:'center'}}>
          <div style={{width:44,height:44,borderRadius:14,margin:'0 auto 14px',display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(66,133,244,.12)',color:'var(--primary)'}}>
            <I n="lock" size={22}/>
          </div>
          <h3 style={{margin:'0 0 6px',fontSize:16,color:'var(--foreground)'}}>{step==="enter"?"Set a 4-digit PIN":"Confirm your PIN"}</h3>
          <p style={{margin:'0 0 4px',fontSize:13,color:'var(--muted-foreground)'}}>{step==="enter"?"You'll need this to open DocKeep.":"Enter it again to confirm."}</p>
          {error&&<p style={{margin:'4px 0 0',fontSize:12,color:'var(--destructive)',fontWeight:600}}>PINs didn't match — try again.</p>}
          <div style={{margin:"20px 0"}}><PinDots length={val.length}/></div>
          <PinKeypad value={val} onChange={setVal}/>
          <button onClick={onCancel} className="ripple" style={{marginTop:16,width:'100%',padding:'12px',borderRadius:14,border:'1px solid var(--border)',background:'var(--card)',color:'var(--foreground)',fontWeight:600,fontSize:14,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>;
    }

    /* ── Edit profile ─────────────────────────── */
    function EditProfileModal({user,saving,onSave,onCancel}) {
      const [name,setName]=useState(user.name||"");
      return <div onClick={onCancel} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div onClick={e=>e.stopPropagation()} className="page-enter" style={{background:'var(--card)',borderRadius:20,padding:24,width:'100%',maxWidth:340}}>
          <h3 style={{margin:'0 0 16px',fontSize:16,color:'var(--foreground)'}}>Edit Profile</h3>
          <label style={{display:'block',fontSize:12,color:'var(--muted-foreground)',marginBottom:6}}>Display name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" autoFocus
            style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1px solid var(--border)',background:'var(--background)',color:'var(--foreground)',fontSize:14,outline:'none',marginBottom:6,boxSizing:'border-box'}}/>
          <p style={{margin:'0 0 20px',fontSize:12,color:'var(--muted-foreground)'}}>{user.email}</p>
          <div style={{display:'flex',gap:10}}>
            <button onClick={onCancel} className="ripple" style={{flex:1,padding:'12px',borderRadius:14,border:'1px solid var(--border)',background:'var(--card)',color:'var(--foreground)',fontWeight:600,fontSize:14,cursor:'pointer'}}>Cancel</button>
            <button onClick={()=>name.trim()&&onSave(name.trim())} disabled={saving||!name.trim()} className="ripple"
              style={{flex:1,padding:'12px',borderRadius:14,border:'none',background:'var(--primary)',color:'#fff',fontWeight:600,fontSize:14,cursor:saving?'default':'pointer',opacity:(saving||!name.trim())?.6:1}}>
              {saving?"Saving…":"Save"}
            </button>
          </div>
        </div>
      </div>;
    }

    /* ── Dashboard ────────────────────────────── */
    function DashboardScreen({onNav,onOpen}) {
      const catCounts = useMemo(()=>{
        const m = {};
        DOCS.forEach(d=>{ const c=d.cat||"Other"; m[c]=(m[c]||0)+1; });
        return CATEGORIES.map(c=>({cat:c,count:m[c]||0})).filter(x=>x.count>0);
      },[]);
      return <div className="flex flex-col gap-6 page-enter" style={{paddingBottom:96}}>
        <div className="flex items-center justify-between lg:hidden">
          <div>
            <p style={{fontSize:14,color:'var(--muted-foreground)'}}>Welcome,</p>
            <h1 style={{fontSize:24,fontWeight:800,color:'var(--foreground)',margin:0}}>Welcome</h1>
          </div>
          <button className="ripple" style={{width:40,height:40,borderRadius:'50%',background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative'}}>
            <I n="notifications" size={20} cls="text-foreground"/>
            <span style={{position:'absolute',top:8,right:8,width:8,height:8,background:'var(--primary)',borderRadius:'50%',outline:'2px solid var(--card)'}}/>
          </button>
        </div>

        <button onClick={()=>onNav("search")} className="ripple" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left',transition:'border-color .15s'}}>
          <I n="search" size={18} style={{color:'var(--muted-foreground)',flexShrink:0}}/>
          <span style={{fontSize:14,color:'var(--muted-foreground)',flex:1}}>Search documents, customers…</span>
          <kbd style={{fontSize:11,color:'var(--muted-foreground)',border:'1px solid var(--border)',borderRadius:8,padding:'2px 6px',fontFamily:'inherit'}}>⌘K</kbd>
        </button>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:12}}>
          {[{icon:"upload",label:"Upload",color:"#4285F4"},{icon:"document_scanner",label:"Scan",color:"#34A853"},{icon:"photo_camera",label:"Camera",color:"#FBBC05"},{icon:"layers",label:"Drive",color:"#EA4335"}].map(a=>(
            <button key={a.label} onClick={()=>onNav("scan")} className="ripple" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:'16px 8px',background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',cursor:'pointer',transition:'box-shadow .15s'}}>
              <div style={{width:48,height:48,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',background:a.color+'15',color:a.color}}>
                <I n={a.icon} size={22}/>
              </div>
              <span style={{fontSize:12,fontWeight:500,color:'var(--foreground)'}}>{a.label}</span>
            </button>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12}}>
          <StatCard icon="description"  label="Total Documents" value={String(DOCS.length)} sub={DOCS.length===0?"Upload your first document":`${DOCS.length} stored`} color="#4285F4"/>
<StatCard icon="trending_up"  label="This Month"       value={String(DOCS.filter(d=>{const dt=new Date(d.date);const now=new Date();return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();}).length)} sub="uploads this month" color="#9C27B0"/>

                      <I n="share" size={15} cls="text-foreground"/>
                    </button>
                    <button aria-label={`Delete ${doc.title||doc.name}`} onClick={e=>{e.stopPropagation();onDelete(doc);}} className="ripple" style={{flex:1,padding:'7px 0',borderRadius:8,background:'var(--muted)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <I n="delete" size={15} style={{color:'var(--destructive)'}}/>

    /* ── Scan ─────────────────────────────────── */
    function ScanScreen({user,onUploaded,onActivity}) {
      const [drag,setDrag]=useState(false);
      const [picked,setPicked]=useState(null);     // {file,name,size}
      const [title,setTitle]=useState("");
      const [category,setCategory]=useState("Other");
      const [docDate,setDocDate]=useState(()=>new Date().toISOString().slice(0,10));
      const [expiryDate,setExpiryDate]=useState("");
      const [refId,setRefId]=useState("");
      const [uploading,setUploading]=useState(false);
      const [error,setError]=useState("");
      const [done,setDone]=useState(false);
      const inputRef=useRef(null);

      function pickFile(file){
        if(!file) return;
        setError(""); setDone(false);
        setPicked({file,name:file.name,size:file.size});
        setTitle(file.name.replace(/\.[^.]+$/,""));
        setCategory("Other");
        setExpiryDate(""); setRefId("");
        setDocDate(new Date().toISOString().slice(0,10));
      }

      async function handleUpload(e){
        e.preventDefault();
        if(!picked) return;
        setUploading(true); setError("");
        try{
          const base64=await fileToBase64(picked.file);
          // Name the actual stored file after the title the person gave it
          // (falling back to the original name) so it shows up by that name
          // wherever it's opened later, instead of a generic scan filename
          // like "Scan documents_20260717_....jpg".
          const origExt = picked.name.includes(".") ? picked.name.slice(picked.name.lastIndexOf(".")) : "";
          const safeTitle = (title||picked.name).trim().replace(/[\\/:*?"<>|]+/g,"-").slice(0,80) || "Document";
          const uploadName = origExt && !safeTitle.toLowerCase().endsWith(origExt.toLowerCase())
            ? `${safeTitle}${origExt}` : safeTitle;
          await apiCall("upload",{
            email:user.email, fileName:uploadName, mimeType:picked.file.type||"application/octet-stream",
            file:base64, type:category, size:picked.size,
            title: title||picked.name, docDate, expiryDate, refId,
            category, tags: "",
          });
          await onUploaded();
          onActivity && onActivity({type:"upload", title:`Uploaded "${title||picked.name}"`, sub:category});
          setDone(true);
          setPicked(null);
        }catch(err){
          setError(err.message||"Upload failed. Check the Apps Script URL and try again.");
        }finally{
          setUploading(false);
        }
      }

      return <div className="flex flex-col gap-6 page-enter" style={{paddingBottom:96}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:'var(--foreground)',margin:0}}>Upload & Scan</h1>
          <p style={{fontSize:14,color:'var(--muted-foreground)',marginTop:4,marginBottom:0}}>Add documents to your library</p>
        </div>
        <input ref={inputRef} type="file" style={{display:'none'}} onChange={e=>pickFile(e.target.files[0])} aria-hidden="true"/>
        {!picked&&<div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);pickFile(e.dataTransfer.files[0]);}}
          onClick={()=>inputRef.current&&inputRef.current.click()}
          role="button" tabIndex={0} onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();inputRef.current&&inputRef.current.click();}}}
          aria-label="Upload a document from your device"
          style={{border:`2px dashed ${drag?'var(--primary)':done?'#34A853':'var(--border)'}`,borderRadius:24,padding:'48px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:16,cursor:'pointer',transition:'all .2s',background:drag?'rgba(66,133,244,.05)':done?'rgba(52,168,83,.05)':'transparent',transform:drag?'scale(1.01)':'scale(1)'}}>
          <div style={{width:80,height:80,borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',background:done?'rgba(52,168,83,.15)':'rgba(66,133,244,.1)'}}>
            <I n={done?"check_circle":"document_scanner"} size={36} fill={done?1:0} style={{color:done?'#34A853':'var(--primary)'}}/>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontWeight:600,color:'var(--foreground)',fontSize:15}}>{done?"Uploaded! Drop another file":"Drop a file here"}</div>
            <div style={{fontSize:13,color:'var(--muted-foreground)',marginTop:4}}>or click to browse your device</div>
          </div>
          <div style={{display:'flex',gap:8,fontSize:12,color:'var(--muted-foreground)',flexWrap:'wrap',justifyContent:'center'}}>
            {["PDF","JPG","PNG","DOCX"].map(f=><span key={f} style={{background:'var(--muted)',padding:'4px 10px',borderRadius:8}}>{f}</span>)}
            <span>· up to 50 MB</span>
          </div>
        </div>}
        {error&&<div role="alert" style={{padding:12,borderRadius:12,background:'rgba(234,67,53,.1)',color:'var(--destructive)',fontSize:13}}>{error}</div>}

        {picked&&<form onSubmit={handleUpload} className="bg-card rounded-2xl border border-border flex flex-col gap-4" style={{padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(66,133,244,.1)',flexShrink:0}}>
              <I n="description" size={20} cls="text-primary"/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{picked.name}</div>
              <div style={{fontSize:11,color:'var(--muted-foreground)'}}>{formatBytes(picked.size)}</div>
            </div>
            <button type="button" onClick={()=>{setPicked(null);setError("");}} aria-label="Cancel" style={{background:'none',border:'none',cursor:'pointer'}}>
              <I n="close" size={18} cls="text-muted-foreground"/>
            </button>
          </div>

          <div style={{display:'grid',gap:12}}>
            <div>
              <label style={{display:'block',fontSize:12,color:'var(--muted-foreground)',marginBottom:6}}>Category</label>
              <select value={category} onChange={e=>setCategory(e.target.value)} style={{width:'100%',padding:'12px',border:'1px solid var(--border)',borderRadius:12,background:'var(--background)',color:'var(--foreground)',fontSize:14}}>
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Document Title" style={{width:'100%',padding:'12px',border:'1px solid var(--border)',borderRadius:12,background:'var(--background)',color:'var(--foreground)',fontSize:14}}/>
            <div>
              <label style={{display:'block',fontSize:12,color:'var(--muted-foreground)',marginBottom:6}}>Document date</label>
              <input type="date" value={docDate} onChange={e=>setDocDate(e.target.value)} style={{width:'100%',padding:'12px',border:'1px solid var(--border)',borderRadius:12,background:'var(--background)',color:'var(--foreground)',fontSize:14}}/>
            </div>
            <div>
              <label style={{display:'block',fontSize:12,color:'var(--muted-foreground)',marginBottom:6}}>Expiry date (optional, for warranties)</label>

            {DOCS.filter(d=>d.type==="scan"||d.type==="image").map(doc=>{

                <div style={{width:44,height:44,borderRadius:12,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:bg}}>
                  <I n="description" size={20} style={{color}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.title||doc.name}</div>

    /* ── Activity ─────────────────────────────── */
    function ActivityScreen() {
      const weekMs = 7*24*60*60*1000;
      const now = Date.now();
      const thisWeek = ACTS.filter(a=> now-new Date(a.time).getTime() <= weekMs);
      const countOf = t => thisWeek.filter(a=>a.type===t).length;
      const stats = [
        {v:String(countOf("upload")),   l:"Uploads",   c:"#4285F4"},
        {v:String(countOf("shared")),   l:"Shared",    c:"#34A853"},
        {v:String(countOf("download")), l:"Opened",    c:"#FBBC05"},
        {v:String(countOf("delete")),   l:"Deleted",   c:"#EA4335"},
      ];
      return <div className="flex flex-col gap-5 page-enter" style={{paddingBottom:96}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h1 style={{fontSize:20,fontWeight:800,color:'var(--foreground)',margin:0}}>Activity</h1>
        </div>
        <div style={{borderRadius:16,padding:16,border:'1px solid rgba(66,133,244,.15)',background:'linear-gradient(135deg,rgba(66,133,244,.1),rgba(66,133,244,.03))'}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--muted-foreground)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>This Week</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8}}>
            {stats.map(s=>(
              <div key={s.l} style={{textAlign:'center'}}>
                <div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div>
                <div style={{fontSize:11,color:'var(--muted-foreground)',marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        {ACTS.length===0?(
          <div style={{textAlign:'center',padding:'64px 20px',color:'var(--muted-foreground)'}}>
            <I n="history" size={48}/>
            <div style={{fontSize:20,fontWeight:700,marginTop:12}}>No Activity Yet</div>
            <div style={{marginTop:8}}>Uploads and changes will appear here.</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {ACTS.map(item=>(
              <div key={item.id} style={{display:'flex',alignItems:'center',gap:12,background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:12}}>
                <div style={{width:36,height:36,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:item.color+'18',color:item.color}}>
                  <I n={item.icon} size={17}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--foreground)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.title}</div>
                  {item.sub&&<div style={{fontSize:11,color:'var(--muted-foreground)',marginTop:2}}>{item.sub}</div>}
                </div>
                <span style={{fontSize:11,color:'var(--muted-foreground)',flexShrink:0,marginLeft:8}}>{timeAgo(item.time)}</span>
              </div>
            ))}
          </div>
        )}
      </div>;
    }

    /* ── Search ───────────────────────────────── */
    function SearchScreen({onNav,user,onOpen}) {
      const storageKey = "dockeep_recent_searches_"+(user?user.email:"guest");
      const [q,setQ]=useState("");
      const [recent,setRecent]=useState(()=>{
        try{ return JSON.parse(localStorage.getItem(storageKey)||"[]"); }catch(e){ return []; }
      });

      function saveSearch(term){
        const t=(term||"").trim();
        if(!t) return;
        setRecent(prev=>{
          const next=[t,...prev.filter(x=>x.toLowerCase()!==t.toLowerCase())].slice(0,6);
          try{ localStorage.setItem(storageKey,JSON.stringify(next)); }catch(e){}
          return next;
        });
      }
      function removeSearch(term){
        setRecent(prev=>{
          const next=prev.filter(x=>x!==term);
          try{ localStorage.setItem(storageKey,JSON.stringify(next)); }catch(e){}
          return next;
        });
      }
      function clearRecent(){
        setRecent([]);
        try{ localStorage.removeItem(storageKey); }catch(e){}
      }

      // Suggestions are derived from the user's own documents (customers +
      // tags actually on file) instead of static placeholder text.
      const suggest=useMemo(()=>{
        const set=new Set();
        DOCS.forEach(d=>{
          if(d.customer) set.add(d.customer);
          (d.tags||[]).forEach(t=>t&&set.add(t));
        });
        return Array.from(set).slice(0,8);
      },[]);

      const results=useMemo(()=>q.length>1?DOCS.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())||(d.customer||"").toLowerCase().includes(q.toLowerCase())||d.tags.some(t=>t.toLowerCase().includes(q.toLowerCase()))||(d.cat||"").toLowerCase().includes(q.toLowerCase())):[],[q]);

      function openResult(doc){
        saveSearch(q);
        openDoc(doc,onOpen);
      }

      return <div className="flex flex-col gap-5 page-enter" style={{paddingBottom:96}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>onNav("dashboard")} className="ripple" style={{width:40,height:40,borderRadius:12,background:'var(--card)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
            <I n="arrow_back" size={19} cls="text-foreground"/>
          </button>
          <div className="search-focus" style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:12,background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'12px 16px',transition:'border-color .15s'}}>
            <I n="search" size={16} style={{color:'var(--muted-foreground)',flexShrink:0}}/>
            <input autoFocus value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") saveSearch(q); }} placeholder="Search everything…" style={{flex:1,minWidth:0,fontSize:14,color:'var(--foreground)',background:'transparent',border:'none',outline:'none'}}/>
            {q&&<button onClick={()=>setQ("")} style={{background:'none',border:'none',cursor:'pointer',padding:0}}><I n="close" size={14} cls="text-muted-foreground"/></button>}
          </div>
        </div>
        {q.length===0?(
          <>
            {recent.length>0&&<div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:4,paddingRight:4}}>
                <span style={{fontSize:11,fontWeight:600,color:'var(--muted-foreground)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Recent Searches</span>
                <button onClick={clearRecent} style={{fontSize:12,color:'var(--primary)',background:'none',border:'none',cursor:'pointer',fontWeight:500}}>Clear</button>
              </div>
              {recent.map(s=>(
                <div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
                  <button onClick={()=>setQ(s)} className="ripple" style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:12,padding:12,borderRadius:16,background:'none',border:'none',cursor:'pointer',textAlign:'left',transition:'background .15s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--muted)'} onMouseLeave={e=>e.currentTarget.style.background='none'}>
                    <div style={{width:32,height:32,borderRadius:10,background:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <I n="schedule" size={15} cls="text-muted-foreground"/>
                    </div>
                    <span style={{fontSize:14,color:'var(--foreground)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s}</span>
                  </button>
                  <button onClick={()=>removeSearch(s)} aria-label={`Remove "${s}" from recent searches`} className="ripple" style={{background:'none',border:'none',cursor:'pointer',padding:8,flexShrink:0}}>
                    <I n="close" size={14} cls="text-muted-foreground"/>
                  </button>
                </div>
              ))}
            </div>}
            {suggest.length>0&&<div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted-foreground)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8,paddingLeft:4}}>Suggestions</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {suggest.map(s=>(
                  <button key={s} onClick={()=>setQ(s)} className="ripple" style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,fontSize:13,color:'var(--foreground)',cursor:'pointer',transition:'all .15s'}}>
                    <I n="search" size={13} cls="text-muted-foreground"/>{s}
                  </button>
                ))}
              </div>
            </div>}
            {recent.length===0&&suggest.length===0&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12,textAlign:'center',padding:'56px 0',color:'var(--muted-foreground)'}}>
                <div style={{width:72,height:72,borderRadius:22,background:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <I n="search" size={26} cls="text-muted-foreground"/>
                </div>
                <div style={{fontSize:14}}>Search by document name, customer, or tag.</div>
              </div>
            )}
          </>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <p style={{fontSize:12,color:'var(--muted-foreground)',margin:0,paddingLeft:4}}>{results.length} result{results.length!==1?"s":""} for "{q}"</p>
            {results.length===0?(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16,textAlign:'center',padding:'48px 0'}}>
                <div style={{width:80,height:80,borderRadius:24,background:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <I n="search" size={28} cls="text-muted-foreground"/>
                </div>
                <div>
                  <div style={{fontWeight:600,color:'var(--foreground)',fontSize:15}}>No results found</div>
                  <div style={{fontSize:13,color:'var(--muted-foreground)',marginTop:4}}>Try different keywords or check spelling</div>
                </div>
                {suggest.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}}>
                  {suggest.slice(0,3).map(s=><button key={s} onClick={()=>setQ(s)} className="ripple" style={{fontSize:13,color:'var(--primary)',border:'1px solid rgba(66,133,244,.3)',borderRadius:14,padding:'6px 12px',background:'none',cursor:'pointer'}}>Try "{s}"</button>)}
                </div>}
              </div>
            ):results.map(doc=>{
              const {label,bg,color}=docMeta(doc.type);
              return <div key={doc.id} className="ripple" onClick={()=>openResult(doc)} style={{display:'flex',alignItems:'center',gap:12,background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:12,cursor:'pointer',transition:'box-shadow .15s'}}>
                <div style={{width:44,height:44,borderRadius:12,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,background:bg}}>
                  <I n="description" size={20} style={{color}}/><span style={{fontSize:9,fontWeight:700,color}}>{label}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.title||doc.name}</div>
                  <div style={{display:'flex',gap:8,fontSize:11,color:'var(--muted-foreground)',marginTop:2}}><span>{doc.cat}</span>{doc.customer&&<><span>·</span><span>{doc.customer}</span></>}</div>
                </div>
                <I n="chevron_right" size={15} cls="text-muted-foreground flex-shrink-0"/>
              </div>;
            })}
          </div>
        )}
      </div>;
    }

    /* ── Profile ──────────────────────────────── */
    function ProfileScreen({dark,setDark,user,onSignOut,pinEnabled,onEnablePin,onDisablePin,onEditProfile}) {
  const [notice,setNotice]=useState("");
  useEffect(()=>{
    if(!notice) return;
    const t=setTimeout(()=>setNotice(""),2600);
    return ()=>clearTimeout(t);
  },[notice]);

  function downloadData(){
    if(!DOCS.length){ setNotice("No documents to export yet."); return; }
    const payload=DOCS.map(d=>({
      name:d.name, type:d.cat||d.type, customer:d.customer, tags:d.tags,
      size:d.rawSize, date:d.date, docDate:d.docDate, expiryDate:d.expiryDate,
      refId:d.refId, url:d.url,
    }));
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="dockeep-documents.json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    setNotice("Export downloaded.");
  }

  function togglePin(next){
    if(next) onEnablePin();
    else { if(window.confirm("Turn off PIN lock?")) onDisablePin(); }
  }

  return <div className="flex flex-col gap-5 page-enter" style={{paddingBottom:96,position:'relative'}}>
    <div className="bg-card rounded-3xl border border-border" style={{padding:24,textAlign:'center'}}>
      {user&&user.picture
        ? <img src={user.picture} alt="" referrerPolicy="no-referrer" style={{width:72,height:72,borderRadius:'50%',margin:'0 auto',objectFit:'cover'}}/>
        : <div style={{width:72,height:72,borderRadius:'50%',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--muted)',fontSize:28,fontWeight:700}}>{user?(user.name||user.email||"?").charAt(0).toUpperCase():"?"}</div>}
      <h2 style={{margin:'16px 0 4px',color:'var(--foreground)'}}>{user?(user.name||user.email):"Guest User"}</h2>
      <div style={{color:'var(--muted-foreground)',fontSize:13}}>{user?user.email:"No account connected"}</div>
    </div>

    <div className="bg-card rounded-2xl border border-border" style={{overflow:'hidden'}}>
      <button style={rowStyle} className="ripple" onClick={onEditProfile}><span>✏️ Edit Profile</span><I n="chevron_right"/></button>
      <div style={{...rowStyle,cursor:'default'}}>
        <div>
          <div style={{fontWeight:500}}>🔒 PIN Lock</div>
          <div style={{fontSize:12,color:'var(--muted-foreground)'}}>{pinEnabled?'Enabled':'Disabled'}</div>
        </div>
        <Toggle on={pinEnabled} onChange={togglePin}/>
      </div>
      <div style={{...rowStyle,cursor:'default'}}>
        <div>
          <div style={{fontWeight:500}}>🌙 Dark Mode</div>
          <div style={{fontSize:12,color:'var(--muted-foreground)'}}>{dark?'Enabled':'Disabled'}</div>
        </div>
        <Toggle on={dark} onChange={setDark}/>
      </div>
      <button style={{...rowStyle,borderBottom:'none'}} className="ripple" onClick={downloadData}>
        <span>⬇️ Download My Data</span>
        <I n="download"/>
      </button>
    </div>

    {user&&<button onClick={onSignOut} className="ripple" style={{width:'100%',padding:'14px',borderRadius:16,border:'1px solid var(--border)',background:'var(--card)',color:'var(--destructive)',fontWeight:600,fontSize:14,cursor:'pointer'}}>Sign Out</button>}
    <div style={{textAlign:'center',fontSize:12,color:'var(--muted-foreground)'}}>DocKeep v2.5.0</div>

    {notice&&<div style={{position:'fixed',left:'50%',bottom:96,transform:'translateX(-50%)',zIndex:200,background:'var(--foreground)',color:'var(--background)',padding:'12px 18px',borderRadius:14,fontSize:13,fontWeight:500,boxShadow:'0 8px 24px rgba(0,0,0,.25)',maxWidth:'90vw',textAlign:'center'}}>{notice}</div>}
  </div>;
}
const rowStyle={width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 16px',background:'none',border:'none',borderBottom:'1px solid var(--border)',textAlign:'left',fontSize:14,cursor:'pointer'};

/* ── Bottom Nav ───────────────────────────── */
    const NAV=[{id:"dashboard",label:"Home",icon:"home"},{id:"documents",label:"Docs",icon:"description"},{id:"scan",label:"Scan",icon:"document_scanner"},{id:"activity",label:"Activity",icon:"show_chart"},{id:"profile",label:"Profile",icon:"person"}];
    const SIDE=[{id:"dashboard",label:"Dashboard",icon:"home"},{id:"documents",label:"Documents",icon:"description"},{id:"scan",label:"Upload & Scan",icon:"document_scanner"},{id:"activity",label:"Activity",icon:"show_chart"},{id:"search",label:"Search",icon:"search"},{id:"profile",label:"Profile",icon:"settings"}];

    function BottomNav({cur,onNav}) {
      return <nav style={{position:'fixed',bottom:0,left:0,right:0,zIndex:50,backgroundColor:'var(--card)',borderTop:'1px solid var(--border)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',paddingBottom:'env(safe-area-inset-bottom)'}} className="lg:hidden">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-around',padding:'8px 4px 12px'}}>
          {NAV.map(({id,label,icon})=>{
            const active=cur===id;
            return <button key={id} onClick={()=>onNav(id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flex:1,minWidth:0,background:'none',border:'none',cursor:'pointer',padding:0,transition:'all .15s'}}>
              <div style={{width:56,height:32,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:99,background:active?'rgba(66,133,244,.12)':'transparent',transition:'background .2s'}}>
                <I n={icon} size={22} fill={active?1:0} w={active?500:300} style={{color:active?'var(--primary)':'var(--muted-foreground)'}}/>
              </div>
              <span style={{fontSize:10,fontWeight:500,color:active?'var(--primary)':'var(--muted-foreground)'}}>{label}</span>
            </button>;
          })}
        </div>
      </nav>;
    }

    function Sidebar({cur,onNav,user}) {
      return <aside style={{display:'flex',flexDirection:'column',width:260,background:'var(--card)',borderRight:'1px solid var(--border)',position:'fixed',left:0,top:0,bottom:0,zIndex:40}} className="hidden lg:flex">
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'20px 24px',borderBottom:'1px solid var(--border)'}}>
          <div style={{width:36,height:36,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--primary)'}}>
            <I n="description" size={18} style={{color:'white'}}/>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:17,color:'var(--foreground)',lineHeight:1}}>DocKeep</div>
            <div style={{fontSize:11,color:'var(--muted-foreground)',marginTop:2}}>Document Manager</div>
          </div>
        </div>
        <nav style={{flex:1,overflowY:'auto',padding:'16px 12px',display:'flex',flexDirection:'column',gap:4}}>
          {SIDE.map(({id,label,icon})=>{
            const active=cur===id;
            return <button key={id} onClick={()=>onNav(id)} className="ripple" style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:16,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',textAlign:'left',color:active?'var(--primary)':'var(--muted-foreground)',background:active?'rgba(66,133,244,.1)':'transparent',transition:'all .15s'}}
              onMouseEnter={e=>{if(!active)e.currentTarget.style.background='var(--muted)';}} onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent';}}>
              <I n={icon} size={18} fill={active?1:0} w={active?500:300}/>
              <span>{label}</span>
              {active&&<div style={{marginLeft:'auto',width:6,height:20,borderRadius:3,background:'var(--primary)',opacity:.6}}/>}
            </button>;
          })}
        </nav>
        <div style={{padding:16,borderTop:'1px solid var(--border)'}}>
          <button onClick={()=>onNav("profile")} style={{display:'flex',alignItems:'center',gap:12,paddingLeft:4,width:'100%',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            {user&&user.picture
              ? <img src={user.picture} alt="" referrerPolicy="no-referrer" style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
              : <div style={{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,flexShrink:0,background:'rgba(66,133,244,.15)',color:'var(--primary)'}}>{user?(user.name||user.email||"?").charAt(0).toUpperCase():"?"}</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,color:'var(--foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?(user.name||user.email):"Guest"}</div>
              <div style={{fontSize:11,color:'var(--muted-foreground)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?user.email:"Not signed in"}</div>
            </div>
            <I n="chevron_right" size={15} cls="text-muted-foreground"/>
          </button>
        </div>
      </aside>;
    }

    /* ── Loading ──────────────────────────────── */
    function FullScreenLoader({label}) {
      return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,background:'var(--background)',color:'var(--foreground)'}}>
        <div style={{width:40,height:40,borderRadius:'50%',border:'3px solid var(--muted)',borderTopColor:'var(--primary)',animation:'spin 0.8s linear infinite'}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <div style={{fontSize:13,color:'var(--muted-foreground)'}}>{label}</div>
      </div>;
    }

    /* ── Login ────────────────────────────────── */
    function LoginScreen({onCredential,error}) {
      const btnRef=useRef(null);
      const [gsiError,setGsiError]=useState("");
      useEffect(()=>{
        if(!CONFIGURED){ return; }
        if(!window.google || !window.google.accounts){
          const t=setTimeout(()=>{
            if(!window.google || !window.google.accounts){
              console.error("Google Identity Services script did not load.");
            }
          },3000);
          return ()=>clearTimeout(t);
        }
        try{
          window.google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: (resp)=>onCredential(resp.credential),
          });
          if(btnRef.current){
            window.google.accounts.id.renderButton(btnRef.current, { theme:"outline", size:"large", width:280, shape:"pill" });
          }
        }catch(err){
          console.error("Google Sign-In init failed:", err);
          setGsiError("Google Sign-In couldn't start — this page's URL likely isn't added under \"Authorized JavaScript origins\" for this Client ID (this also fails if you open the file directly instead of via http/https). See the browser console for details.");
        }
      },[]);
      return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--background)',padding:24}}>
        <div className="bg-card rounded-3xl border border-border page-enter" style={{padding:32,maxWidth:360,width:'100%',textAlign:'center'}}>
          <div style={{width:56,height:56,borderRadius:16,margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--primary)'}}>
            <I n="description" size={26} style={{color:'#fff'}}/>
          </div>
          <h1 style={{fontSize:20,fontWeight:800,color:'var(--foreground)',margin:'0 0 4px'}}>DocKeep</h1>
          <p style={{fontSize:13,color:'var(--muted-foreground)',margin:'0 0 24px'}}>Sign in with Google to view and manage your documents.</p>
          {!CONFIGURED
            ? <div style={{fontSize:12,color:'var(--destructive)',background:'rgba(234,67,53,.08)',borderRadius:12,padding:12,textAlign:'left'}}>
                Not configured yet — set <code>APPS_SCRIPT_URL</code> and <code>GOOGLE_CLIENT_ID</code> near the top of the script in this file.
              </div>
            : gsiError
            ? <div style={{fontSize:12,color:'var(--destructive)',background:'rgba(234,67,53,.08)',borderRadius:12,padding:12,textAlign:'left'}}>{gsiError}</div>
            : <div ref={btnRef} style={{display:'flex',justifyContent:'center'}}/>}
          {error&&<div role="alert" style={{marginTop:16,fontSize:12,color:'var(--destructive)'}}>{error}</div>}
        </div>
      </div>;
    }

    /* ── App ──────────────────────────────────── */
    function App() {
      const [dark,setDarkState]=useState(()=>window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      const setDark=(v)=>{const nv=typeof v==="function"?v(dark):v;setDarkState(nv);try{localStorage.setItem("dockeep_dark",nv?"1":"0");}catch(e){}};
      // Toggle the dark class on <html> (not just an inner div) so the
      // --background/--foreground CSS variables cascade all the way up to
      // <body> and #root. Without this, body keeps the light-mode
      // background forever, which shows as a pale strip below the app
      // whenever a screen's content is shorter than the window.
      useEffect(()=>{
        document.documentElement.classList.toggle("dark", dark);
        document.body.classList.toggle("dark", dark);
      },[dark]);
      const [screen,setScreen]=useState("dashboard");
      const [docCatFilter,setDocCatFilter]=useState(null);
      const [user,setUser]=useState(null);
      const [booting,setBooting]=useState(true);   // restoring session on first load
      const [dataLoading,setDataLoading]=useState(false);
      const [authError,setAuthError]=useState("");
      const [confirmDoc,setConfirmDoc]=useState(null); // doc pending delete confirmation
      const [toast,setToast]=useState("");
      // PIN lock is a device-only convenience lock (not tied to the backend) —
      // the PIN itself lives in localStorage, never sent to the server.
      const [pin,setPinState]=useState(()=>{ try{ return localStorage.getItem("dockeep_pin")||""; }catch(e){ return ""; } });
      const [locked,setLocked]=useState(false);
      const [pinSetup,setPinSetup]=useState(null); // null | {step:'enter'|'confirm', first, error}
      const [editingProfile,setEditingProfile]=useState(false);
      const [savingProfile,setSavingProfile]=useState(false);
      const [, setDocsTick]=useState(0);
      const bump=()=>setDocsTick(t=>t+1);
      const showFAB=screen==="dashboard"||screen==="documents";
      const mainRef=useRef(null);
      // isLg drives ALL desktop-vs-mobile layout decisions below (sidebar,
      // bottom nav, desktop header, FAB). We deliberately don't lean on
      // Tailwind's "hidden lg:flex" utility classes for this — those only
      // work once the Tailwind CDN script has fetched+parsed and injected
      // its stylesheet, which can lag or fail entirely on a slow/flaky
      // mobile connection. Driving visibility from real inline styles tied
      // to a matchMedia listener means the layout is correct immediately,
      // regardless of network conditions.
      const [isLg,setIsLg]=useState(()=>typeof window!=="undefined"&&window.matchMedia("(min-width:1024px)").matches);

      useEffect(()=>{
        const mq=window.matchMedia("(min-width:1024px)");
        const upd=()=>{
          setIsLg(mq.matches);
          if(mainRef.current) mainRef.current.style.marginLeft=mq.matches?"260px":"0";
        };
        upd();
        mq.addEventListener("change",upd);
        return ()=>mq.removeEventListener("change",upd);
      },[]);

      // Restore session + dark-mode preference from localStorage on first load.
      useEffect(()=>{
        try{
          const saved=localStorage.getItem("dockeep_dark");
          if(saved!==null) setDarkState(saved==="1");
        }catch(e){}
        (async()=>{
          try{
            const saved=localStorage.getItem("dockeep_user");
            if(saved){
              const u=JSON.parse(saved);
              setUser(u);
              loadActs(u.email); bump();
              await loadFor(u);
              try{ if(localStorage.getItem("dockeep_pin")) setLocked(true); }catch(e){}
            }
          }catch(e){}
          setBooting(false);
        })();
      },[]);

      async function loadFor(u){
        setDataLoading(true);
        try{ await refreshDocuments(u.email); bump(); }
        catch(e){ setAuthError(e.message||"Couldn't load your documents."); }
        finally{ setDataLoading(false); }
      }

      function logActivity(entry){
        if(!user) return;
        pushActivity(user.email, entry);
        bump();
      }

      function goTo(id, categoryFilter){
        setDocCatFilter(categoryFilter||null);
        setScreen(id);
      }

      function handleOpenDoc(doc){
        logActivity({type:"download", title:`Opened "${doc.title||doc.name}"`, sub:doc.cat||""});
      }

      async function handleCredential(idToken){
        setAuthError("");
        try{
          const payload=decodeJwt(idToken);
          const u={ email:payload.email, name:payload.name, picture:payload.picture };
          await apiCall("login",{ email:u.email, name:u.name, picture:u.picture });
          localStorage.setItem("dockeep_user",JSON.stringify(u));
          setUser(u);
          loadActs(u.email); bump();
          await loadFor(u);
        }catch(e){
          setAuthError(e.message||"Sign-in failed. Check the Apps Script URL is deployed and reachable.");
        }
      }

      function handleSignOut(){
        try{
          localStorage.removeItem("dockeep_user");
          if(window.google && window.google.accounts) window.google.accounts.id.disableAutoSelect();
        }catch(e){}
        DOCS=[]; ACTS=[]; setUser(null); setScreen("dashboard"); bump();
      }

      function handleDelete(doc){
        setConfirmDoc(doc); // opens the in-app confirm modal below; see confirmDeleteNow
      }

      function startPinSetup(){ setPinSetup({step:"enter",first:"",error:false}); }
      function cancelPinSetup(){ setPinSetup(null); }
      function submitPinStep(digits){
        if(pinSetup.step==="enter"){
          setPinSetup({step:"confirm",first:digits,error:false});
        }else if(digits===pinSetup.first){
          try{ localStorage.setItem("dockeep_pin",digits); }catch(e){}
          setPinState(digits);
          setPinSetup(null);
          setToast("PIN lock enabled.");
        }else{
          setPinSetup({step:"enter",first:"",error:true});
        }
      }
      function handleDisablePin(){
        try{ localStorage.removeItem("dockeep_pin"); }catch(e){}
        setPinState("");
        setToast("PIN lock turned off.");
      }
      function handleUnlock(digits){
        if(digits===pin){ setLocked(false); return true; }
        return false;
      }
      function handleForgotPin(){
        // No server-side recovery for a device-only lock — the safe fallback
        // is to clear it and sign the account out entirely.
        try{ localStorage.removeItem("dockeep_pin"); }catch(e){}
        setPinState("");
        setLocked(false);
        handleSignOut();
      }

      async function handleSaveProfile(name){
        setSavingProfile(true);
        try{
          await apiCall("updateProfile",{ email:user.email, name });
          const nu={...user,name};
          try{ localStorage.setItem("dockeep_user",JSON.stringify(nu)); }catch(e){}
          setUser(nu);
          setEditingProfile(false);
          setToast("Profile updated.");
        }catch(e){
          setToast("Couldn't update profile: "+(e.message||"unknown error"));
        }finally{
          setSavingProfile(false);
        }
      }

      async function confirmDeleteNow(){
        const doc=confirmDoc;
        if(!doc) return;
        setConfirmDoc(null);
        const prev=DOCS;
        DOCS=DOCS.filter(d=>d.id!==doc.id); bump();
        try{
          await apiCall("delete",{ id:doc.id });
          logActivity({type:"delete", title:`Deleted "${doc.name}"`, sub:doc.cat||""});
          setToast(`"${doc.name}" deleted`);
        }catch(e){
          DOCS=prev; bump();
          setToast("Couldn't delete that document: "+(e.message||"unknown error"));
        }
      }

      useEffect(()=>{
        if(!toast) return;
        const t=setTimeout(()=>setToast(""),3200);
        return ()=>clearTimeout(t);
      },[toast]);

      if(booting) return <FullScreenLoader label="Loading DocKeep…"/>;
      if(!user) return <LoginScreen onCredential={handleCredential} error={authError}/>;
      if(locked) return <PinLockScreen onUnlock={handleUnlock} onForgot={handleForgotPin}/>;

      const screens={
        dashboard: <DashboardScreen onNav={goTo} onOpen={handleOpenDoc}/>,
        documents: <DocumentsScreen onDelete={handleDelete} onOpen={handleOpenDoc} onActivity={logActivity} initialCategory={docCatFilter} key={docCatFilter||"all"}/>,
        scan:      <ScanScreen user={user} onUploaded={()=>loadFor(user)} onActivity={logActivity}/>,
        activity:  <ActivityScreen/>,
        search:    <SearchScreen onNav={goTo} user={user} onOpen={handleOpenDoc}/>,
        profile:   <ProfileScreen dark={dark} setDark={setDark} user={user} onSignOut={handleSignOut}
                     pinEnabled={!!pin} onEnablePin={startPinSetup} onDisablePin={handleDisablePin}
                     onEditProfile={()=>setEditingProfile(true)}/>,
      };

      return <div className={dark?"dark":""} style={{minHeight:'100vh',width:'100%',overflowX:'hidden'}}>
        <div style={{minHeight:'100vh',width:'100%',display:'flex',background:'var(--background)',color:'var(--foreground)',fontFamily:'Inter,system-ui,sans-serif'}}>
          {isLg&&<Sidebar cur={screen} onNav={goTo} user={user}/>}
          <div ref={mainRef} style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',transition:'margin-left .3s'}}>
            {/* Desktop top bar */}
            {isLg&&<header style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 32px',borderBottom:'1px solid var(--border)',background:'var(--card)',flexShrink:0,gap:16}}>
              <div><p style={{fontSize:12,color:'var(--muted-foreground)',margin:0}}>Welcome,</p><p style={{fontSize:15,fontWeight:600,color:'var(--foreground)',margin:0}}>{(user.name||user.email).split(" ")[0]} 👋</p></div>
              <button onClick={()=>goTo("search")} style={{display:'flex',alignItems:'center',gap:12,background:'var(--muted)',borderRadius:16,padding:'10px 16px',width:288,border:'none',cursor:'pointer',textAlign:'left',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--secondary)'} onMouseLeave={e=>e.currentTarget.style.background='var(--muted)'}>
                <I n="search" size={16} style={{color:'var(--muted-foreground)',flexShrink:0}}/>
                <span style={{flex:1,fontSize:14,color:'var(--muted-foreground)'}}>Search documents…</span>
                <kbd style={{fontSize:11,color:'var(--muted-foreground)',border:'1px solid var(--border)',borderRadius:6,padding:'2px 6px',fontFamily:'inherit'}}>⌘K</kbd>
              </button>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {dataLoading&&<div aria-label="Loading" style={{width:16,height:16,borderRadius:'50%',border:'2px solid var(--muted)',borderTopColor:'var(--primary)',animation:'spin 0.8s linear infinite'}}/>}
                <button onClick={()=>setDark(!dark)} className="ripple" style={{width:40,height:40,borderRadius:'50%',background:'var(--muted)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}} aria-label="Toggle dark mode">
                  <I n={dark?"light_mode":"dark_mode"} size={18} cls="text-foreground"/>
                </button>
                <button onClick={()=>goTo("profile")} className="ripple" style={{width:40,height:40,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,border:'none',cursor:'pointer',background:'rgba(66,133,244,.15)',color:'var(--primary)',overflow:'hidden'}} aria-label="Open profile">
                  {user.picture?<img src={user.picture} alt="" referrerPolicy="no-referrer" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:(user.name||user.email).charAt(0).toUpperCase()}
                </button>
              </div>
            </header>}

            {/* Screen */}
            <main style={{flex:1,minHeight:0,overflowY:isLg?'auto':'visible',overflowX:'hidden',WebkitOverflowScrolling:'touch'}}>
              <div style={{padding:'20px 16px',maxWidth:896,margin:'0 auto',width:'100%'}} key={screen} className="lg:px-8 lg:pt-8">
                {screens[screen]||screens.dashboard}
              </div>
            </main>
          </div>

          {/* FAB */}
          {showFAB&&!isLg&&<button onClick={()=>setScreen("scan")} className="ripple"
            style={{position:'fixed',bottom:'calc(88px + env(safe-area-inset-bottom))',right:16,zIndex:50,width:56,height:56,borderRadius:16,background:'var(--primary)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 24px rgba(66,133,244,.45)',transition:'transform .15s, box-shadow .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.07)';e.currentTarget.style.boxShadow='0 12px 32px rgba(66,133,244,.55)';}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 8px 24px rgba(66,133,244,.45)';}}>
            <I n="add" size={26} style={{color:'white'}}/>
          </button>}

          {!isLg&&<BottomNav cur={screen} onNav={goTo}/>}

          {/* Delete confirmation — a real in-app modal rather than
              window.confirm(), which many mobile in-app browsers / webviews
              silently block or auto-dismiss, making the delete button look
              broken even though the code behind it is fine. */}
          {confirmDoc&&<div onClick={()=>setConfirmDoc(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
            <div onClick={e=>e.stopPropagation()} className="page-enter" style={{background:'var(--card)',borderRadius:20,padding:24,width:'100%',maxWidth:340,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>
              <div style={{width:44,height:44,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(234,67,53,.12)',color:'var(--destructive)',marginBottom:14}}>
                <I n="delete" size={22}/>
              </div>
              <h3 style={{margin:'0 0 6px',fontSize:16,color:'var(--foreground)'}}>Delete document?</h3>
              <p style={{margin:'0 0 20px',fontSize:13,color:'var(--muted-foreground)'}}>"{confirmDoc.name}" will be permanently deleted. This can't be undone.</p>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setConfirmDoc(null)} className="ripple" style={{flex:1,padding:'12px',borderRadius:14,border:'1px solid var(--border)',background:'var(--card)',color:'var(--foreground)',fontWeight:600,fontSize:14,cursor:'pointer'}}>Cancel</button>
                <button onClick={confirmDeleteNow} className="ripple" style={{flex:1,padding:'12px',borderRadius:14,border:'none',background:'var(--destructive)',color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer'}}>Delete</button>
              </div>
            </div>
          </div>}

          {/* Toast */}
          {toast&&<div style={{position:'fixed',left:'50%',bottom:isLg?24:96,transform:'translateX(-50%)',zIndex:200,background:'var(--foreground)',color:'var(--background)',padding:'12px 18px',borderRadius:14,fontSize:13,fontWeight:500,boxShadow:'0 8px 24px rgba(0,0,0,.25)',maxWidth:'90vw',textAlign:'center'}}>{toast}</div>}

          {pinSetup&&<PinSetupModal step={pinSetup.step} error={pinSetup.error} onSubmit={submitPinStep} onCancel={cancelPinSetup}/>}
          {editingProfile&&<EditProfileModal user={user} saving={savingProfile} onSave={handleSaveProfile} onCancel={()=>setEditingProfile(false)}/>}
        </div>
      </div>;
    }

    /* ── Error boundary ───────────────────────── */
    class ErrorBoundary extends React.Component {
      constructor(props){ super(props); this.state={err:null}; }
      static getDerivedStateFromError(err){ return {err}; }
      componentDidCatch(err,info){ console.error("DocKeep crashed:", err, info); }
      render(){
        if(this.state.err){
          return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,fontFamily:'Inter,system-ui,sans-serif',background:'#F3F6FE'}}>
            <div style={{maxWidth:420,textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
              <h2 style={{color:'#1A1C26',margin:'0 0 8px'}}>Something went wrong</h2>
              <p style={{color:'#5F6368',fontSize:14,margin:'0 0 16px'}}>{String(this.state.err.message||this.state.err)}</p>
              <p style={{color:'#5F6368',fontSize:12}}>Open the browser console (F12) for full details, or reload the page.</p>
            </div>
          </div>;
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(ErrorBoundary, null, React.createElement(App))
    );
  </script>
</body>
</html>
